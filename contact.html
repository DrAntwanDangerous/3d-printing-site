<!DOCTYPE html>

<head>
    <title>Contact us</title>
    <link rel="stylesheet" href="style.css">
</head>

</head>
<div class="section">
    <h2>Contact / Feedback Form</h2>
    <h6>Please fill out the form below to get in touch or provide feedback on our prototypes.</h6>

    <form action="#" method="GET">

        <!-- Name -->
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <!-- Reason -->
        <label for="reason">Reason for enquiry or feedback:</label><br>
        <textarea id="reason" name="reason" rows="4" cols="40" required></textarea><br><br>

        <!-- Prototype Preference -->
        <label>Prototype Preference:</label><br>

        <input type="radio" name="prototype" value="p1"> Prototype 1<br>
        <input type="radio" name="prototype" value="p2"> Prototype 2<br>
        <input type="radio" name="prototype" value="p3"> Prototype 3<br>
        <input type="radio" name="prototype" value="final"> Final Design<br><br>

        <!-- Submit -->
        <input type="submit" value="Submit">
        <br> <br>
        <h5>Thank you for your feedback!</h5>
        <form action="thankyou.html"></form>

    </form>
</div>
</html>
